version: "3.8"

# ─── Kutay Orchestrator — All services ────────────────────────────────────────
# Monitoring configs (Prometheus + Grafana provisioning) are inlined below.
# Only the Grafana dashboard JSON is kept as a separate file.

services:
  sandbox:
    build:
      context: .
      dockerfile: docker/Dockerfile.sandbox
    container_name: orchestrator-sandbox
    network_mode: bridge
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./src/workspace:/app/workspace
    deploy:
      resources:
        limits:
          memory: 256M
    restart: unless-stopped

  vane:
    image: itzcrazykns1337/vane:latest
    container_name: vane
    restart: unless-stopped
    ports:
      - "3000:3000"
      - "3002:8080"  # SearXNG direct access (bypasses Vane LLM)
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ${VANE_DATA_DIR:-./docker/data/vane}:/home/vane/data

  frontail:
    image: mthenw/frontail
    container_name: orchestrator-frontail
    volumes:
      - ./logs:/logs:ro
    ports:
      - "9001:9001"
    command: --ui-highlight --number 1000 /logs/orchestrator.jsonl
    deploy:
      resources:
        limits:
          memory: 50M
    mem_limit: 50m
    restart: unless-stopped

  # ─── Monitoring: Prometheus ─────────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:latest
    container_name: kutay-prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - prometheus_data:/prometheus
    extra_hosts:
      - "host.docker.internal:host-gateway"
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        cat > /tmp/prometheus.yml << 'CONF'
        global:
          scrape_interval: 15s
          evaluation_interval: 15s
        scrape_configs:
          - job_name: "llama-server"
            metrics_path: /metrics
            static_configs:
              - targets: ["host.docker.internal:8080"]
            scrape_interval: 5s
          - job_name: "kutay-orchestrator"
            metrics_path: /metrics
            static_configs:
              - targets: ["host.docker.internal:8000"]
            scrape_interval: 15s
        CONF
        /bin/prometheus \
          --config.file=/tmp/prometheus.yml \
          --storage.tsdb.path=/prometheus \
          --web.console.libraries=/etc/prometheus/console_libraries \
          --web.console.templates=/etc/prometheus/consoles
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: "0.5"

  # ─── Monitoring: Grafana ────────────────────────────────────────────────────
  grafana:
    image: grafana/grafana:latest
    container_name: kutay-grafana
    restart: unless-stopped
    ports:
      - "3001:3000"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./docker/kutay-dashboard.json:/var/lib/grafana/dashboards/kutay-overview.json:ro
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_AUTH_ANONYMOUS_ENABLED=true
      - GF_AUTH_ANONYMOUS_ORG_ROLE=Viewer
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        mkdir -p /etc/grafana/provisioning/datasources /etc/grafana/provisioning/dashboards
        cat > /etc/grafana/provisioning/datasources/ds.yml << 'CONF'
        apiVersion: 1
        datasources:
          - name: Prometheus
            uid: Prometheus
            type: prometheus
            access: proxy
            url: http://prometheus:9090
            isDefault: true
            editable: false
        CONF
        cat > /etc/grafana/provisioning/dashboards/db.yml << 'CONF'
        apiVersion: 1
        providers:
          - name: "default"
            orgId: 1
            folder: ""
            type: file
            disableDeletion: false
            updateIntervalSeconds: 30
            options:
              path: /var/lib/grafana/dashboards
              foldersFromFilesStructure: false
        CONF
        /run.sh
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: "0.5"

volumes:
  prometheus_data:
  grafana_data:
