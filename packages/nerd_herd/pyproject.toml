[build-system]
requires = ["setuptools>=42"]
build-backend = "setuptools.build_meta"

[project]
name = "nerd-herd"
version = "0.1.0"
description = "Standalone observability: GPU, VRAM budget, health, inference metrics, Prometheus exposition"
requires-python = ">=3.10"
dependencies = [
    "yazbunu>=0.2.0",
    "pynvml>=11.0.0",
    "psutil>=5.9.0",
    "prometheus_client>=0.20.0",
    "aiohttp>=3.9.0",
]

[tool.setuptools.packages.find]
where = ["src"]
