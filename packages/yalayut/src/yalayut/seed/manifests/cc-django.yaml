name: cc-django
name_original: cookiecutter-django
version: 1.0.0
artifact_type: skill
kind: shell_recipe
source: github:cookiecutter/cookiecutter-django
owner: cookiecutter
license: BSD-3-Clause
mechanizable: true
applies_to: execution
intent_keywords: [django, web-app, fullstack, celery, docker, postgresql]
inputs_schema:
