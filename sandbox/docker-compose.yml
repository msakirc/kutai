version: "3.8"

services:
  sandbox:
    build: .
    container_name: orchestrator-sandbox
    network_mode: bridge
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ../workspace:/app/workspace
    deploy:
      resources:
        limits:
          memory: 1024M
          cpus: "1.0"
    restart: unless-stopped

  frontail:
    image: mthenw/frontail
    container_name: orchestrator-frontail
    volumes:
      - ../logs:/logs:ro
    ports:
      - "9001:9001"
    command: --ui-highlight --number 1000 /logs/orchestrator.jsonl
    mem_limit: 50m
    restart: unless-stopped
