[build-system]
requires = ["setuptools>=42"]
build-backend = "setuptools.build_meta"

[project]
name = "yazbunu"
version = "0.1.0"
description = "Structured JSONL logging with a built-in web viewer"
readme = "README.md"
license = "MIT"
requires-python = ">=3.10"
dependencies = []
authors = [
    {name = "Sakir Cimen", email = "sakircimen@gmail.com"},
]
keywords = ["logging", "jsonl", "structured-logging", "log-viewer"]
classifiers = [
    "Development Status :: 4 - Beta",
    "Intended Audience :: Developers",
    "License :: OSI Approved :: MIT License",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.10",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Topic :: System :: Logging",
]

[project.optional-dependencies]
server = ["aiohttp>=3.9.0"]

[project.urls]
Homepage = "https://github.com/msakirc/yazbunu"
Repository = "https://github.com/msakirc/yazbunu"

[tool.setuptools.packages.find]
where = ["src"]

[project.scripts]
yazbunu-server = "yazbunu.server:main"
