version: "3.8"

# ─── Kutay Orchestrator — All services ────────────────────────────────────────
# Monitoring: Grafana scrapes NerdHerd directly on port 9881 (no Prometheus).
# Only the Grafana dashboard JSON is kept as a separate file.

services:
  sandbox:
    build:
      context: .
      dockerfile: docker/Dockerfile.sandbox
    container_name: orchestrator-sandbox
    network_mode: bridge
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./src/workspace:/app/workspace
    deploy:
      resources:
        limits:
          memory: 256M
    restart: unless-stopped

  # ─── Monitoring: Grafana ────────────────────────────────────────────────────
  grafana:
    image: grafana/grafana:latest
    container_name: kutay-grafana
    restart: unless-stopped
    ports:
      - "3001:3000"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./docker/kutay-dashboard.json:/var/lib/grafana/dashboards/kutay-overview.json:ro
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_AUTH_ANONYMOUS_ENABLED=true
      - GF_AUTH_ANONYMOUS_ORG_ROLE=Viewer
    extra_hosts:
      - "host.docker.internal:host-gateway"
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        mkdir -p /etc/grafana/provisioning/datasources /etc/grafana/provisioning/dashboards
        cat > /etc/grafana/provisioning/datasources/ds.yml << 'CONF'
        apiVersion: 1
        datasources:
          - name: Prometheus
            uid: Prometheus
            type: prometheus
            access: proxy
            url: http://host.docker.internal:9881
            isDefault: true
            editable: false
        CONF
        cat > /etc/grafana/provisioning/dashboards/db.yml << 'CONF'
        apiVersion: 1
        providers:
          - name: "default"
            orgId: 1
            folder: ""
            type: file
            disableDeletion: false
            updateIntervalSeconds: 30
            options:
              path: /var/lib/grafana/dashboards
              foldersFromFilesStructure: false
        CONF
        /run.sh
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: "0.5"

volumes:
  grafana_data:
