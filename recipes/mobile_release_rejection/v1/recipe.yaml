name: mobile_release_rejection
version: v1
description: "App Store / Google Play rejection playbook: common rejection reasons with diagnosis + fix templates for Expo apps"
requires:
  tech_stack:
    - "expo"
    - "fastapi+sqlite+expo"
    - "fastapi+postgres+expo"
  features: []
conflicts_with: []
post_hooks:
  # mobile_release_rejection is a markdown playbook recipe — no source
  # code emitted, no tests/ dir shipped. test_run with zero collected
  # tests exits 5 + total==0 → post-hook fails its own recipe. mobile_ci
  # correctly omits test_run for the same reason. (Sweep 2026-05-18 Z5 P3.)
  - imports_check
templates:
  rejection_response: templates/rejection_response.md.template
  demo_account: templates/demo_account.json.template
prompts:
  expo: prompts/expo.md
lessons_domain: mobile_release_rejection
dependencies:
  backend: []
  frontend: []
param_defaults:
  APP_NAME: "MyApp"
  BUNDLE_ID: "com.example.app"
  SUPPORT_EMAIL: "support@example.com"
  DEMO_USERNAME: "demo@example.com"
  DEMO_PASSWORD: "DemoPass123!"
entry_points:
  playbook: spec.md
  rejection_response: templates/rejection_response.md.template
