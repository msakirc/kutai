<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="theme-color" content="#1a1a2e">
<link rel="manifest" href="/static/manifest.json">
<title>Yazbunu</title>
<style>
  :root {
    --bg: #1a1a2e;
    --surface: #16213e;
    --text: #e0e0e0;
    --text-dim: #888;
    --border: #2a2a4a;
    --accent: #4fc3f7;
    --error: #ef5350;
    --warn: #ffa726;
    --info: #4fc3f7;
    --debug: #888;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Cascadia Code', 'Fira Code', 'JetBrains Mono', monospace;
    font-size: 13px;
    background: var(--bg);
    color: var(--text);
    height: 100vh;
    display: flex;
    flex-direction: column;
  }

  /* ─── Toolbar ─── */
  .toolbar {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    padding: 8px 12px;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    align-items: center;
  }
  .toolbar select, .toolbar input, .toolbar button {
    font-family: inherit;
    font-size: 13px;
    background: var(--bg);
    color: var(--text);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 6px 10px;
  }
  .toolbar button {
    cursor: pointer;
    background: var(--accent);
    color: #000;
    border: none;
    font-weight: bold;
  }
  .toolbar button.active {
    background: var(--error);
  }
  .toolbar input[type="text"] {
    flex: 1;
    min-width: 120px;
  }
  .status {
    color: var(--text-dim);
    font-size: 11px;
    margin-left: auto;
  }

  /* ─── Log area ─── */
  .log-area {
    flex: 1;
    overflow-y: auto;
    padding: 4px 0;
  }
  .log-line {
    display: flex;
    padding: 2px 12px;
    border-bottom: 1px solid var(--border);
    gap: 8px;
    align-items: baseline;
    word-break: break-word;
  }
  .log-line:hover { background: rgba(255,255,255,0.03); }
  .log-line.level-ERROR { background: rgba(239,83,80,0.1); }
  .log-line.level-WARNING { background: rgba(255,167,38,0.1); }
  .log-line.level-CRITICAL { background: rgba(239,83,80,0.2); }
  .log-line.level-DEBUG { opacity: 0.6; }

  .ts { color: var(--text-dim); white-space: nowrap; font-size: 11px; }
  .level { font-weight: bold; width: 50px; font-size: 11px; }
  .level-ERROR .level { color: var(--error); }
  .level-WARNING .level { color: var(--warn); }
  .level-INFO .level { color: var(--info); }
  .level-DEBUG .level { color: var(--debug); }
  .level-CRITICAL .level { color: var(--error); }
  .src { color: var(--accent); white-space: nowrap; }
  .msg {
    flex: 1;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    cursor: pointer;
  }
  .msg.expanded {
    white-space: pre-wrap;
    overflow: visible;
  }
  .pill {
    display: inline-block;
    font-size: 10px;
    padding: 1px 6px;
    border-radius: 8px;
    background: var(--border);
    color: var(--text);
    cursor: pointer;
    margin-left: 4px;
  }
  .pill:hover { background: var(--accent); color: #000; }
  .pill.trace-key { background: #7c4dff; color: #fff; }
  .pill.trace-key:hover { background: #b388ff; color: #000; }
  .pill.trace-active { background: var(--accent); color: #000; }
  .fn-info { color: var(--text-dim); font-size: 11px; }
  mark { background: #ffa726; color: #000; border-radius: 2px; padding: 0 1px; }

  /* ─── Mobile ─── */
  @media (max-width: 600px) {
    .ts { display: none; }
    .src { max-width: 100px; overflow: hidden; text-overflow: ellipsis; }
    .toolbar { padding: 6px 8px; gap: 4px; }
    .toolbar select, .toolbar input, .toolbar button { padding: 8px; font-size: 14px; }
    .log-line { padding: 4px 8px; font-size: 14px; }
  }
</style>
</head>
<body>

<div class="toolbar">
  <select id="fileSelect"><option value="">Loading...</option></select>
  <select id="levelFilter">
    <option value="">All levels</option>
    <option value="DEBUG">DEBUG</option>
    <option value="INFO">INFO</option>
    <option value="WARNING">WARNING</option>
    <option value="ERROR">ERROR</option>
    <option value="CRITICAL">CRITICAL</option>
  </select>
  <select id="timeRange">
    <option value="">All time</option>
    <option value="5">Last 5m</option>
    <option value="15">Last 15m</option>
    <option value="60">Last 1h</option>
    <option value="360">Last 6h</option>
    <option value="1440">Last 24h</option>
  </select>
  <input type="text" id="searchBox" placeholder="Search src/msg (regex)...">
  <button id="tailBtn">Live Tail</button>
  <span id="traceInfo" style="display:none;font-size:11px;color:var(--accent);">
    Trace: <span id="traceLabel"></span>
    <button id="traceClear" style="font-size:10px;padding:2px 6px;margin-left:4px;">✕</button>
  </span>
  <span class="status" id="status">Ready</span>
</div>

<div class="log-area" id="logArea"></div>

<script>
const LEVEL_ORDER = {DEBUG: 0, INFO: 1, WARNING: 2, ERROR: 3, CRITICAL: 4};
const POLL_MS = 2000;
const CONTEXT_KEYS = new Set(["ts", "level", "src", "msg", "fn", "ln", "exc"]);
let TRACE_KEYS = new Set(["task_id", "mission_id"]);

let allLines = [];
let tailing = false;
let tailTimer = null;
let tailWs = null;
let lastTs = "";
let currentFile = "";
let traceFilter = null; // {key: "task", value: "123"}

const $file = document.getElementById("fileSelect");
const $level = document.getElementById("levelFilter");
const $time = document.getElementById("timeRange");
const $search = document.getElementById("searchBox");
const $tailBtn = document.getElementById("tailBtn");
const $area = document.getElementById("logArea");
const $status = document.getElementById("status");
const $traceInfo = document.getElementById("traceInfo");
const $traceLabel = document.getElementById("traceLabel");
const $traceClear = document.getElementById("traceClear");

// ─── State from URL hash ───
function loadHash() {
  const p = new URLSearchParams(location.hash.slice(1));
  if (p.get("file")) currentFile = p.get("file");
  if (p.get("level")) $level.value = p.get("level");
  if (p.get("time")) $time.value = p.get("time");
  if (p.get("q")) $search.value = p.get("q");
  if (p.get("trace")) {
    const [k, ...rest] = p.get("trace").split("=");
    traceFilter = {key: k, value: rest.join("=")};
    $traceInfo.style.display = "";
    $traceLabel.textContent = p.get("trace");
  }
}
function saveHash() {
  const p = new URLSearchParams();
  if (currentFile) p.set("file", currentFile);
  if ($level.value) p.set("level", $level.value);
  if ($time.value) p.set("time", $time.value);
  if ($search.value) p.set("q", $search.value);
  if (traceFilter) p.set("trace", `${traceFilter.key}=${traceFilter.value}`);
  location.hash = p.toString();
}

// ─── API ───
async function fetchFiles() {
  const r = await fetch("/api/files");
  const d = await r.json();
  const opts = [`<option value="__all__">All files</option>`];
  for (const f of d.files) {
    opts.push(`<option value="${f.name}">${f.name} (${(f.size/1024).toFixed(0)}KB)</option>`);
  }
  $file.innerHTML = opts.join("");
  if (currentFile) $file.value = currentFile;
  else currentFile = $file.value;
}

async function fetchLogs(file, lines = 2000) {
  $status.textContent = "Loading...";
  const url = file === "__all__"
    ? `/api/logs/all?lines=${lines}`
    : `/api/logs?file=${encodeURIComponent(file)}&lines=${lines}`;
  const r = await fetch(url);
  if (!r.ok) { $status.textContent = "Error " + r.status; return; }
  const d = await r.json();
  allLines = d.lines.map(l => { try { return JSON.parse(l); } catch { return null; } }).filter(Boolean);
  lastTs = allLines.length ? allLines[allLines.length - 1].ts : "";
  $status.textContent = `${allLines.length} / ${d.total} lines`;
  render();
  $area.scrollTop = $area.scrollHeight;
}

function appendTailLines(rawLines) {
  const newDocs = rawLines.map(l => { try { return JSON.parse(l); } catch { return null; } }).filter(Boolean);
  if (!newDocs.length) return;
  allLines.push(...newDocs);
  lastTs = allLines[allLines.length - 1].ts;
  $status.textContent = `${allLines.length} lines (live)`;
  render();
  $area.scrollTop = $area.scrollHeight;
}

function startWsTail() {
  const proto = location.protocol === "https:" ? "wss:" : "ws:";
  const url = `${proto}//${location.host}/ws/tail?file=${encodeURIComponent(currentFile)}`;
  tailWs = new WebSocket(url);
  tailWs.onmessage = (e) => {
    const msg = JSON.parse(e.data);
    if (msg.type === "lines") appendTailLines(msg.lines);
  };
  tailWs.onerror = () => {
    // Fallback to HTTP polling if WebSocket fails
    if (tailing && !tailTimer) {
      tailTimer = setInterval(fetchTailHttp, POLL_MS);
    }
  };
  tailWs.onclose = () => {
    if (tailing && !tailTimer) {
      tailTimer = setInterval(fetchTailHttp, POLL_MS);
    }
  };
}

async function fetchTailHttp() {
  if (!currentFile || !lastTs) return;
  const r = await fetch(`/api/tail?file=${encodeURIComponent(currentFile)}&after=${encodeURIComponent(lastTs)}`);
  if (!r.ok) return;
  const d = await r.json();
  if (d.lines.length) appendTailLines(d.lines);
}

function stopTail() {
  if (tailWs) { tailWs.close(); tailWs = null; }
  if (tailTimer) { clearInterval(tailTimer); tailTimer = null; }
}

// ─── Rendering ───
function render() {
  const levelMin = LEVEL_ORDER[$level.value] ?? -1;
  let regex = null;
  if ($search.value) {
    try { regex = new RegExp($search.value, "i"); } catch { regex = null; }
  }
  const timeMins = parseInt($time.value) || 0;
  const timeCutoff = timeMins ? new Date(Date.now() - timeMins * 60000).toISOString() : "";

  const frag = document.createDocumentFragment();
  const counts = {DEBUG: 0, INFO: 0, WARNING: 0, ERROR: 0, CRITICAL: 0};
  let shown = 0;

  for (const doc of allLines) {
    if ((LEVEL_ORDER[doc.level] ?? 0) < levelMin) continue;
    if (timeCutoff && (doc.ts || "") < timeCutoff) continue;
    if (traceFilter && String(doc[traceFilter.key] ?? "") !== traceFilter.value) continue;
    if (regex && !regex.test(doc.src || "") && !regex.test(doc.msg || "")) continue;
    counts[doc.level] = (counts[doc.level] || 0) + 1;
    shown++;

    const row = document.createElement("div");
    row.className = `log-line level-${doc.level}`;

    // Timestamp
    const tsEl = document.createElement("span");
    tsEl.className = "ts";
    tsEl.textContent = doc.ts ? doc.ts.slice(11, 23) : "";
    row.appendChild(tsEl);

    // Level
    const lvl = document.createElement("span");
    lvl.className = "level";
    lvl.textContent = doc.level;
    row.appendChild(lvl);

    // Source
    const src = document.createElement("span");
    src.className = "src";
    src.textContent = doc.src || "";
    row.appendChild(src);

    // Message
    const msg = document.createElement("span");
    msg.className = "msg";
    const msgText = doc.msg || "";
    if (regex) {
      msg.innerHTML = msgText.replace(/</g, "&lt;").replace(regex, m => `<mark>${m}</mark>`);
    } else {
      msg.textContent = msgText;
    }

    // fn/ln info
    if (doc.fn) {
      const fnSpan = document.createElement("span");
      fnSpan.className = "fn-info";
      fnSpan.textContent = ` (${doc.fn}:${doc.ln})`;
      msg.appendChild(fnSpan);
    }

    // Context pills
    for (const [k, v] of Object.entries(doc)) {
      if (CONTEXT_KEYS.has(k)) continue;
      const pill = document.createElement("span");
      const isTrace = TRACE_KEYS.has(k);
      const isActive = traceFilter && traceFilter.key === k && traceFilter.value === String(v);
      pill.className = `pill${isTrace ? " trace-key" : ""}${isActive ? " trace-active" : ""}`;
      pill.textContent = `${k}=${v}`;
      pill.onclick = (e) => {
        e.stopPropagation();
        if (isTrace) {
          setTrace(k, String(v));
        } else {
          $search.value = String(v); saveHash(); render();
        }
      };
      msg.appendChild(pill);
    }

    msg.onclick = () => msg.classList.toggle("expanded");
    row.appendChild(msg);

    // Exception (collapsible)
    if (doc.exc) {
      const exc = document.createElement("details");
      exc.style.cssText = "color:var(--error);font-size:11px;margin-top:2px;width:100%";
      exc.innerHTML = `<summary>Exception</summary><pre style="white-space:pre-wrap;margin:4px 0">${doc.exc.replace(/</g,"&lt;")}</pre>`;
      row.appendChild(exc);
    }

    frag.appendChild(row);
  }

  $area.innerHTML = "";
  $area.appendChild(frag);

  // Level counts in status
  const parts = [];
  if (counts.ERROR) parts.push(`${counts.ERROR} ERR`);
  if (counts.WARNING) parts.push(`${counts.WARNING} WARN`);
  parts.unshift(`${shown} lines`);
  $status.textContent = parts.join(" · ");
}

// ─── Trace ───
function setTrace(key, value) {
  // Switch to "All files" when tracing to see cross-component flow
  if (currentFile !== "__all__") {
    currentFile = "__all__";
    $file.value = "__all__";
    $tailBtn.disabled = true;
    if (tailing) { stopTail(); tailing = false; $tailBtn.textContent = "Live Tail"; $tailBtn.classList.remove("active"); }
  }
  traceFilter = {key, value};
  $traceInfo.style.display = "";
  $traceLabel.textContent = `${key}=${value}`;
  saveHash();
  fetchLogs("__all__").then(() => { $area.scrollTop = 0; });
}

function clearTrace() {
  traceFilter = null;
  $traceInfo.style.display = "none";
  saveHash();
  render();
}

$traceClear.onclick = clearTrace;

// ─── Event handlers ───
$file.onchange = () => {
  currentFile = $file.value;
  if (tailing) { stopTail(); tailing = false; $tailBtn.textContent = "Live Tail"; $tailBtn.classList.remove("active"); }
  $tailBtn.disabled = currentFile === "__all__";
  saveHash();
  fetchLogs(currentFile);
};

$level.onchange = () => { saveHash(); render(); };
$time.onchange = () => { saveHash(); render(); };
$search.oninput = () => { saveHash(); render(); };

$tailBtn.onclick = () => {
  tailing = !tailing;
  $tailBtn.textContent = tailing ? "Pause" : "Live Tail";
  $tailBtn.classList.toggle("active", tailing);
  if (tailing) {
    startWsTail();
  } else {
    stopTail();
  }
};

// ─── Init ───
loadHash();
fetch("/api/config").then(r => r.json()).then(c => {
  TRACE_KEYS = new Set(c.trace_keys || []);
}).catch(() => {});
fetchFiles().then(() => {
  if ($file.value) fetchLogs($file.value);
});
</script>
</body>
</html>
