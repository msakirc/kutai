[pytest]
asyncio_mode = auto
addopts = --import-mode=importlib
# Per-test wall-clock cap so a stuck test fails fast with a stack dump
# instead of looking like an infinite hang (a slow cold embedding-model
# load is ~20s — 120s leaves ample headroom). `thread` method is the only
# one supported on Windows. Live-LLM tests that genuinely run longer can
# override with @pytest.mark.timeout(N) (or 0 to disable).
timeout = 120
timeout_method = thread
markers =
    llm: requires a live LLM model loaded
    integration: hits the network or external tooling (uvx/npx); skipped when absent
