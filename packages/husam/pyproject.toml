[build-system]
requires = ["setuptools>=42"]
build-backend = "setuptools.build_meta"

[project]
name = "husam"
version = "0.1.0"
description = "kumandan hüsamettin — the non-agentic single-call worker (grader, summarizer, raw LLM dispatch)"
requires-python = ">=3.10"
dependencies = ["dabidabi", "yazbunu>=0.2.0"]

[tool.setuptools.packages.find]
where = ["src"]
