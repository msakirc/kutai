name: dependency_hygiene_python
version: v1
kind: dependency_hygiene
description: "Run pip-audit on the workspace, flag known-vulnerable packages."
requires:
  tech_stack:
    - "python"
    - "fastapi+postgres+nextjs"
    - "fastapi+sqlite+nextjs"
  features: []
conflicts_with: []
post_hooks: []
templates:
  notes: notes.md
prompts: {}
lessons_domain: dependency_hygiene
dependencies:
  backend: []
  frontend: []
param_defaults:
  REQUIREMENTS_PATH: "requirements.txt"
  AUTO_MERGE_PATCH: "false"
entry_points:
  notes: notes.md
