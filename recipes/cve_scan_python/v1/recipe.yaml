name: cve_scan_python
version: v1
kind: cve_scan
description: "Query OSV.dev for each pinned Python package and surface known CVEs."
requires:
  tech_stack:
    - "python"
    - "fastapi+postgres+nextjs"
    - "fastapi+sqlite+nextjs"
  features: []
conflicts_with: []
post_hooks: []
templates:
  notes: notes.md
prompts: {}
lessons_domain: cve_scan
dependencies:
  backend: []
  frontend: []
param_defaults:
  REQUIREMENTS_PATH: "requirements.txt"
  ECOSYSTEM: "PyPI"
entry_points:
  notes: notes.md
