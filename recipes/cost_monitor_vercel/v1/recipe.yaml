name: cost_monitor_vercel
version: v1
kind: cost_monitor
description: "Pull daily Vercel team usage and check for slope anomalies."
requires:
  tech_stack:
    - "vercel"
    - "nextjs"
  features: []
conflicts_with: []
post_hooks: []
templates:
  notes: notes.md
prompts: {}
lessons_domain: cost_monitor
dependencies:
  backend: []
  frontend: []
param_defaults:
